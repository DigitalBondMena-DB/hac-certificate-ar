<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="شركة هاك لمستحضرات التجميل تتقدم بجزيل الشكر تقديراً للجهود المتميزة والمساهمة الفعالة في نجاح مسيرة الشركة وتطوير أعمالها. فخورون بشركاء نجاحنا."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://digitalbondmena-db.github.io/hac-certificate-ar"
    />
    <meta
      property="og:image"
      content="https://digitalbondmena-db.github.io/hac-certificate-ar/images/certificate_og.png"
    />
    <meta
      property="twitter:image"
      content="https://digitalbondmena-db.github.io/hac-certificate-ar/images/certificate_og.png"
    />
    <title>شهادة تقدير من شركة هاك لمستحضرات التجميل</title>
    <link rel="icon" href="./hac-logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link href="./css/style.css" rel="stylesheet" />
    <style>
      #print-certificate * {
        letter-spacing: normal !important;
        word-spacing: normal !important;
      }
      #print-certificate span {
        display: inline-block;
        white-space: pre;
      }
    </style>
  </head>
  <body
    class="bg-white text-black antialiased h-screen flex items-center justify-center"
  >
    <main
      id="print-certificate"
      class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8 py-2"
    >
      <section class="pt-6 md:pt-8 bg-hac">
        <article
          class="mx-auto max-w-5xl p-6 sm:p-10 relative overflow-hidden"
          aria-labelledby="certificate-title"
        >
          <div
            class="pointer-events-none absolute inset-0 opacity-40"
            aria-hidden="true"
          ></div>
          <div class="relative">
            <a href="https://haccosmetics.com" class="block" target="_blank">
              <img
                src="./images/hac-logo.png"
                width="60"
                height="60"
                class="mx-auto mb-5"
                alt="hac cosmatics"
              />
            </a>

            <h1
              id="certificate-title"
              class="font-heading text-center text-4xl sm:text-5xl leading-tight text-black lg:my-10 my-5"
            >
              <span>شهادة</span> <span>شكر</span> <span>وتقدير</span>
            </h1>
            <p class="text-center lg:my-10 my-5 text-black/65">
              <span>تتقدم</span> <span>شركة</span> <span>هاك</span>
              <span>لمستحضرات</span> <span>التجميل</span> <span>بجزيل</span>
              <span>الشكر</span> <span>والعرفان</span> <span>إلى</span>
              <span>الدكتور</span>
            </p>
            <p
              class="font-heading text-center text-4xl text-luxury lg:my-10 my-5"
            >
              <span>محمد</span> <span>علي</span> <span>جاد</span>
            </p>
            <p
              class="text-sm sm:text-base text-center text-black/70 leading-relaxed max-w-2xl mx-auto lg:my-10 my-5"
            >
              <span>وذلك</span> <span>تقديراً</span> <span>لجهوده</span>
              <span>المتميزة،</span> <span>ومساهمته</span> <span>الفعالة</span>
              <span>في</span> <span>نجاح</span> <span>مسيرة</span>
              <span>الشركة</span> <span>وتطوير</span> <span>أعمالها</span>
            </p>

            <dl
              class="flex flex-wrap justify-center gap-x-14 gap-y-5 lg:my-10 my-5 text-sm text-black/80"
            >
              <div class="text-center">
                <dt class="font-semibold text-black">
                  <span>إدارة</span> <span>الشركة</span>
                </dt>
                <dd class="mt-1">
                  <span>هاك</span> <span>لمسحضرات</span> <span>التجميل</span>
                </dd>
              </div>
              <div class="text-center">
                <dt class="font-semibold text-black">
                  <span>تحريراً</span> <span>في</span>
                </dt>
                <dd class="mt-1">
                  <span>٢٤</span> <span>ذو</span> <span>القعدة</span>
                  <span>١٤٤٧</span> <span>هـ</span>
                </dd>
              </div>
            </dl>

                      <button

                        data-action="copy"
                        aria-label="Copy link"

                        role="menuitem"

                        <svg
                          width="17"
                          height="17"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.8"
                          aria-hidden="true"
                        >
                          <rect x="9" y="9" width="11" height="11" rx="2" />
                          <rect x="4" y="4" width="11" height="11" rx="2" />

                      <button
                        class="share-icon"
                        data-action="download"
                        aria-label="Download snapshot"

                        role="menuitem"
                      >
                        <svg
                          width="17"
                          height="17"
                          viewBox="0 0 24 24"

                    <p

                      class="pt-3 text-xs text-black/70 min-h-[1rem]"
                      aria-live="polite"
                    ></p>
                  </div>
                </div>
                <div>
                  <p
                    class="text-sm text-black flex items-center gap-2 font-semibold"
                  >
                    <span>مشغل</span> <span>بواسطة</span>
                    <a
                      href="https://test.techhouseksa.com"
                      target="_blank"
                      class="block"
                    >
                      <img

    </main>
